services:
  vllm-gemma4-e4b:
    # https://docs.vllm.ai/projects/recipes/en/latest/Google/Gemma4.html#docker
    image: vllm/vllm-openai:gemma4-cu130
    container_name: agenteach-vllm-gemma4-e4b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    command: >
      google/gemma-4-E4B-it
      --dtype bfloat16
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.90}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL:-1}
      --api-key ${VLLM_API_KEY:-}
      --served-model-name gemma4:e4b
      --enable-prefix-caching
      --trust-remote-code
      --enable-auto-tool-choice
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --chat-template examples/tool_chat_template_gemma4.jinja
      --default-chat-template-kwargs '{"enable_thinking": true}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-all}
              capabilities: [gpu]
    shm_size: "8gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

networks:
  default:
    name: agenteach-network
